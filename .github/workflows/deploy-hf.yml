name: Deploy Backend to HuggingFace Spaces

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/deploy-hf.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push backend to HuggingFace Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_USERNAME: ${{ secrets.HF_USERNAME }}
          HF_SPACE: ag-sas-backend
        run: |
          git config --global user.email "deploy@ag-sas.app"
          git config --global user.name "AG-SAS Deploy Bot"

          # Clone HF Space
          git clone https://$HF_USERNAME:$HF_TOKEN@huggingface.co/spaces/$HF_USERNAME/$HF_SPACE hf-space

          # Salin isi backend/ ke root HF Space
          rsync -av --delete \
            --exclude='.git' \
            --exclude='venv/' \
            --exclude='__pycache__/' \
            --exclude='*.pyc' \
            --exclude='.env' \
            --exclude='.pytest_cache/' \
            backend/ hf-space/

          cd hf-space
          git add -A

          # Hanya commit kalau ada perubahan
          git diff --staged --quiet || git commit -m "Deploy from GitHub: ${{ github.sha }}"
          git push
