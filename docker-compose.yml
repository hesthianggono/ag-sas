version: "3.9"

services:
  db:
    image: postgres:15-alpine
    container_name: ag_sas_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-agsas}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agsas_secret}
      POSTGRES_DB: ${POSTGRES_DB:-ag_sas}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agsas -d ag_sas"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ag_sas_backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://agsas:agsas_secret@db:5432/ag_sas
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - report_output:/app/reports
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ag_sas_frontend
    restart: unless-stopped
    env_file:
      - ./frontend/.env.local
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend
    command: npm run dev

volumes:
  postgres_data:
  report_output:
