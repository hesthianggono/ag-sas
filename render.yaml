services:
  # ── Backend FastAPI ────────────────────────────────────────────────────────
  - type: web
    name: ag-sas-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    region: singapore   # paling dekat Indonesia
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ag-sas-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "60"
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: "7"
      - key: ENVIRONMENT
        value: production
      - key: ALLOWED_ORIGINS
        # Isi dengan URL Vercel Anda setelah deploy frontend
        value: "https://ag-sas.vercel.app,https://ag-sas-frontend.vercel.app"
    healthCheckPath: /health
    autoDeploy: true

  # ── Database PostgreSQL ────────────────────────────────────────────────────
databases:
  - name: ag-sas-db
    plan: free
    region: singapore
    databaseName: ag_sas
    user: agsas
